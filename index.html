<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AS資産配分シミュレーター V5</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: #f0f4f8; padding: 20px; color: #333; line-height: 1.6; }
        .card { max-width: 650px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #1a73e8; font-size: 1.4em; border-bottom: 2px solid #eef2f7; padding-bottom: 15px; margin-bottom: 20px; }
        
        .info-banner { background: #e8f0fe; border-left: 5px solid #1a73e8; padding: 15px; border-radius: 4px; margin-bottom: 20px; font-size: 0.9em; }
        .max-profit-val { font-size: 1.2em; font-weight: bold; color: #1a73e8; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .group { display: flex; flex-direction: column; }
        .full { grid-column: span 2; }
        label { font-size: 0.8em; font-weight: bold; margin-bottom: 5px; color: #666; }
        select, input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; background: #fff; }
        
        .res-container { margin-top: 25px; padding: 20px; border-radius: 12px; background: #fff; border: 2px solid #1a73e8; }
        .bank-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .bank-box { padding: 15px; border-radius: 8px; background: #f8f9fa; border-top: 4px solid #1a73e8; }
        .bank-box.red { border-top-color: #e74c3c; }
        .val { font-size: 1.2em; font-weight: bold; display: block; margin-top: 5px; }
        .sub-val { font-size: 0.75em; color: #888; display: block; }
        
        .error-msg { background: #fee; color: #c00; padding: 15px; border-radius: 8px; border: 1px solid #fcc; margin-top: 20px; display: none; text-align: center; font-weight: bold; }
        .rate-status { font-size: 0.7em; color: #999; text-align: right; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h1>AS資産配分シミュレーター</h1>

    <div class="info-banner">
        現在のスワップ設定での利益上限 (1通貨ペア):<br>
        <span class="max-profit-val" id="maxProfitDisplay">0</span> <span class="max-profit-val">円 / 月</span>
        <div style="font-size: 0.8em; color: #555; margin-top: 5px;">※1回0.12Lot・1日5エントリー・週3日稼働の制限時 </div>
    </div>

    <div class="section-title" style="font-weight:bold; margin-bottom:10px; font-size:0.9em; color:#1a73e8;">条件設定</div>
    <div class="input-grid">
        <div class="group full">
            <label>目標とする月の利益</label>
            <select id="target" onchange="calc()">
                <option value="10000">10,000円</option>
                <option value="20000">20,000円</option>
                <option value="30000" selected>30,000円</option>
                <option value="40000">40,000円</option>
                <option value="50000">50,000円</option>
            </select>
        </div>
        <div class="group">
            <label>備えたい変動幅 (円)</label>
            <input type="number" id="vol" value="1.0" min="0" step="0.5" oninput="calc()">
        </div>
        <div class="group">
            <label>0.1Lotあたりのスワップ (円)</label>
            <input type="number" id="swap" value="100" oninput="calc()">
        </div>
        <div class="group full">
            <label>現在のドル円レート (自動取得)</label>
            <input type="number" id="rate" value="160.0" step="0.1" oninput="calc()">
            <div id="rateStatus" class="rate-status">レート取得中...</div>
        </div>
    </div>

    <div id="resultArea">
        <div class="res-container">
            <div style="text-align:center; margin-bottom: 15px;">
                <div style="font-size:0.85em; color:#666;">推奨：1回あたりのエントリーロット</div>
                <div style="font-size:1.8em; font-weight:bold; color:#1a73e8;"><span id="lotPerEntry">0.00</span> Lot</div>
                <div style="font-size:0.8em; color:#999;">(最大保有合計: <span id="maxLots">0.00</span> Lot)</div>
            </div>

            <div class="bank-grid">
                <div class="bank-box">
                    <label>海外口座 (A/1000倍)</label>
                    <span class="val" id="xmTotal">0 円</span>
                    <span class="sub-val">内、バッファ: <span id="xmBuffer">0</span>円</span>
                </div>
                <div class="bank-box red">
                    <label>国内口座 (B/25倍)</label>
                    <span class="val" id="rakutenTotal">0 円</span>
                    <span class="sub-val">内、バッファ: <span id="rakutenBuffer">0</span>円</span>
                </div>
            </div>
        </div>
    </div>

    <div id="errorArea" class="error-msg">
        ⚠️ ロット上限(0.12)を超えています<br>
        <span style="font-size: 0.85em; font-weight: normal;">この金額を狙うには、スワップの高い業者を選ぶか、通貨ペアを増やす必要があります。</span>
    </div>
</div>

<script>
    // レート取得API
    async function fetchRate() {
        try {
            const res = await fetch('https://api.frankfurter.dev/v1/latest?base=USD&symbols=JPY');
            const data = await res.json();
            document.getElementById('rate').value = data.rates.JPY.toFixed(2);
            document.getElementById('rateStatus').innerText = "最終更新: " + data.date + " (Frankfurter API)";
            calc();
        } catch (e) {
            document.getElementById('rateStatus').innerText = "レート自動取得に失敗しました。手入力してください。";
        }
    }

    function calc() {
        const target = parseFloat(document.getElementById('target').value);
        const swap = parseFloat(document.getElementById('swap').value);
        const vol = parseFloat(document.getElementById('vol').value);
        const rate = parseFloat(document.getElementById('rate').value);

        // --- 1. 現設定での限界利益の算出 ---
        // 0.12Lot * 5回 * (6+5+4)日分 = 週利益
        const maxWeekly = 0.12 * 5 * 15 * (swap / 0.1); 
        const maxMonthly = maxWeekly * 4;
        document.getElementById('maxProfitDisplay').innerText = Math.floor(maxMonthly).toLocaleString();

        // --- 2. 必要ロットの計算 (週15日分スワップモデル) ---
        const weeklyTarget = target / 4;
        const weeklyProfitPer01Lot = swap * 7.5; // 0.1Lot設定時の週利
        const lotPerEntry = (weeklyTarget / (weeklyProfitPer01Lot * 10)) * 0.1;
        
        const maxLots = lotPerEntry * 5 * 3;
        const units = maxLots * 100000;

        // 上限チェック
        if (lotPerEntry > 0.12) {
            document.getElementById('resultArea').style.display = 'none';
            document.getElementById('errorArea').style.display = 'block';
            return;
        } else {
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('errorArea').style.display = 'none';
        }

        // 3. 資金計算
        const buffer = units * vol;
        const marginXM = (units * rate) / 1000;
        const marginRakuten = (units * rate) / 25;

        // 4. 反映
        document.getElementById('lotPerEntry').innerText = lotPerEntry.toFixed(3);
        document.getElementById('maxLots').innerText = maxLots.toFixed(2);
        
        document.getElementById('xmBuffer').innerText = Math.round(buffer).toLocaleString();
        document.getElementById('xmTotal').innerText = Math.round(marginXM + buffer).toLocaleString() + " 円";
        
        document.getElementById('rakutenBuffer').innerText = Math.round(buffer).toLocaleString();
        document.getElementById('rakutenTotal').innerText = Math.round(marginRakuten + buffer).toLocaleString() + " 円";
    }

    // 初期起動
    fetchRate();
</script>

</body>
</html>
